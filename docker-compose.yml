version: "3.9"

services:
  backend:
    build: ./backend
    container_name: xiaoman-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./xiaoman.db
      - UPLOAD_DIR=./uploads
      - ALLOWED_ORIGINS=*
    volumes:
      - ./backend:/app
      - xiaoman_uploads:/app/uploads
      - xiaoman_secrets:/secrets
    restart: unless-stopped
    networks:
      - xiaoman-net

  frontend:
    image: node:20-alpine
    container_name: xiaoman-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - xiaoman-net

volumes:
  xiaoman_uploads:
  xiaoman_secrets:

networks:
  xiaoman-net:
    driver: bridge
